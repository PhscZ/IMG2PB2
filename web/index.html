<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMG2PB2</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #121621;
            overflow: hidden;
        }
        #the_canvas_id {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>

    <!-- The WASM/JS glue is generated by `build-web.sh` (wasm-bindgen) into ./pkg/. -->
    <script type="module">
        import init, { WebHandle } from "./pkg/img2pb2_web.js";

        await init();

        const handle = new WebHandle();
        const canvas = document.getElementById("the_canvas_id");
        await handle.start(canvas);
    </script>
</body>
</html>
